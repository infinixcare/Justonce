<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In — SingleReveal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e; --text: #e8e8f0; --muted: #6b6b8a; --accent: #7c6aff; --accent-soft: rgba(124,106,255,0.15); --danger: #ff4d6d; }
body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 60% 40% at 20% 20%, rgba(124,106,255,0.06) 0%, transparent 60%); pointer-events: none; }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 8px; margin-bottom: 40px; }
.logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 12px var(--accent); }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; position: relative; }
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.6; }
.card-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; margin-bottom: 6px; }
.card-sub { font-size: 0.75rem; color: var(--muted); margin-bottom: 28px; }
.form-label { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; display: block; }
input { width: 100%; background: rgba(128,128,128,0.06); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.82rem; padding: 12px 16px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; margin-bottom: 16px; }
input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
input::placeholder { color: var(--muted); }
.btn { width: 100%; padding: 14px; background: var(--accent); color: #fff; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; border: none; border-radius: 12px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; margin-top: 4px; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,106,255,0.4); }
.btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
.divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: 0.7rem; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.btn-google { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.82rem; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; }
.btn-google:hover { border-color: var(--accent); background: var(--accent-soft); }
.switch-link { text-align: center; margin-top: 20px; font-size: 0.72rem; color: var(--muted); }
.switch-link a { color: var(--accent); text-decoration: none; }
.error-msg { background: var(--danger-soft); border: 1px solid rgba(255,77,109,0.25); border-radius: 8px; padding: 10px 14px; font-size: 0.75rem; color: var(--danger); margin-bottom: 16px; display: none; }
.tabs { display: flex; background: rgba(128,128,128,0.06); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
.tab { flex: 1; text-align: center; font-size: 0.75rem; padding: 10px; cursor: pointer; color: var(--muted); font-family: 'DM Mono', monospace; background: none; border: none; transition: all 0.2s; }
.tab.active { background: var(--accent-soft); color: var(--accent); }
</style>
</head>
<body>

<a href="/" class="logo"><div class="logo-dot"></div>SingleReveal</a>

<div class="card">
  <div class="tabs">
    <button class="tab active" id="tabLogin" onclick="switchTab('login')">Sign in</button>
    <button class="tab" id="tabRegister" onclick="switchTab('register')">Register</button>
  </div>

  <div id="errorMsg" class="error-msg"></div>

  <!-- Login Form -->
  <div id="loginForm">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to access your team workspaces</div>
    <label class="form-label">Email</label>
    <input type="email" id="loginEmail" placeholder="you@company.com" />
    <label class="form-label">Password</label>
    <input type="password" id="loginPassword" placeholder="Your password" />
    <button class="btn" id="loginBtn" onclick="login()">Sign in</button>
    <div class="divider">or</div>
    <button class="btn-google" onclick="showToast('Google login coming soon!')">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- Register Form -->
  <div id="registerForm" style="display:none">
    <div class="card-title">Create account</div>
    <div class="card-sub">Start sharing secrets with your team</div>
    <label class="form-label">Full name</label>
    <input type="text" id="registerName" placeholder="Your name" />
    <label class="form-label">Email</label>
    <input type="email" id="registerEmail" placeholder="you@company.com" />
    <label class="form-label">Password</label>
    <input type="password" id="registerPassword" placeholder="At least 8 characters" />
    <button class="btn" id="registerBtn" onclick="register()">Create account</button>
    <div class="divider">or</div>
    <button class="btn-google" onclick="showToast('Google login coming soon!')">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <div class="switch-link" id="switchLink">
    Don't have an account? <a href="#" onclick="switchTab('register')">Register</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var API = 'https://www.singlereveal.com';

if (localStorage.getItem('sr_token')) {
  window.location.href = '/dashboard.html';
}

function switchTab(tab) {
  document.getElementById('errorMsg').style.display = 'none';
  if (tab === 'login') {
    document.getElementById('tabLogin').classList.add('active');
    document.getElementById('tabRegister').classList.remove('active');
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('switchLink').innerHTML = 'Don\'t have an account? <a href="#" onclick="switchTab(\'register\')">Register</a>';
  } else {
    document.getElementById('tabRegister').classList.add('active');
    document.getElementById('tabLogin').classList.remove('active');
    document.getElementById('registerForm').style.display = 'block';
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('switchLink').innerHTML = 'Already have an account? <a href="#" onclick="switchTab(\'login\')">Sign in</a>';
  }
}

function showError(msg) {
  var el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

async function login() {
  var email = document.getElementById('loginEmail').value.trim();
  var password = document.getElementById('loginPassword').value;
  if (!email || !password) { showError('Please fill in all fields.'); return; }
  var btn = document.getElementById('loginBtn');
  btn.textContent = 'Signing in...';
  btn.disabled = true;
  try {
    var res = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password })
    });
    var data = await res.json();
    if (!res.ok) { showError(data.error || 'Login failed.'); return; }
    localStorage.setItem('sr_token', data.token);
    localStorage.setItem('sr_user', JSON.stringify(data.user));
    window.location.href = '/dashboard.html';
  } catch (err) {
    showError('Network error. Please try again.');
  } finally {
    btn.textContent = 'Sign in';
    btn.disabled = false;
  }
}

async function register() {
  var name = document.getElementById('registerName').value.trim();
  var email = document.getElementById('registerEmail').value.trim();
  var password = document.getElementById('registerPassword').value;
  if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
  if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
  var btn = document.getElementById('registerBtn');
  btn.textContent = 'Creating account...';
  btn.disabled = true;
  try {
    var res = await fetch(API + '/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name, email: email, password: password })
    });
    var data = await res.json();
    if (!res.ok) { showError(data.error || 'Registration failed.'); return; }
    localStorage.setItem('sr_token', data.token);
    localStorage.setItem('sr_user', JSON.stringify(data.user));
    window.location.href = '/dashboard.html';
  } catch (err) {
    showError('Network error. Please try again.');
  } finally {
    btn.textContent = 'Create account';
    btn.disabled = false;
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (document.getElementById('loginForm').style.display !== 'none') login();
    else register();
  }
});

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}
</script>
</body>
</html>
